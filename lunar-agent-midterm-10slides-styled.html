g:38px;min-height:440px}.box h3{font:900 34px Inter;margin:0 0 28px}.box.tool h3{color:var(--g)}.box.agent h3{color:var(--o)}.box ul{font-size:20px;line-height:2;color:var(--m)}.mid{text-align:center;color:var(--o);font-weight:900}.mid i{display:block;height:3px;background:linear-gradient(90deg,var(--l),var(--o));margin:18px 0}.core{height:100%;position:relative}.coreball{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:3px solid var(--o);border-radius:50%;box-shadow:0 0 48px rgba(255,122,26,.35);display:flex;align-items:center;justify-content:center;text-align:center;font:900 22px/1.35 Inter}.coreline{position:absolute;left:50%;top:145px;bottom:145px;width:2px;background:linear-gradient(var(--o),var(--b))}.node{position:absolute;left:50%;transform:translateX(-50%);width:290px;height:106px;border:1px solid rgba(242,244,247,.4);display:flex;align-items:center;justify-content:center;text-align:center;background:rgba(5,11,20,.65);font-size:21px;font-weight:900}.node.top{top:38px}.node.bottom{bottom:38px}.tags{position:absolute;left:90px;top:190px;display:grid;gap:12px}.tags span{border:1px solid rgba(255,122,26,.55);color:var(--o);padding:7px 12px;border-radius:999px;font:800 14px Inter;width:max-content}.product{height:100%;position:relative}.bot{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);width:360px;height:300px;border:5px solid var(--w);border-radius:54px;background:rgba(242,244,247,.035)}.bot:before{content:"";position:absolute;left:58px;top:74px;width:92px;height:92px;border:3px solid var(--b);border-radius:50%}.bot:after{content:"";position:absolute;right:56px;top:84px;width:88px;height:52px;border:3px solid var(--o);border-radius:16px}.call{position:absolute;color:var(--o);font-size:15px;border-top:2px solid var(--o);padding-top:8px;min-width:190px}.call:nth-of-type(2){left:110px;top:100px}.call:nth-of-type(3){right:100px;top:120px}.call:nth-of-type(4){left:90px;bottom:180px}.call:nth-of-type(5){right:95px;bottom:190px}.call:nth-of-type(6){left:260px;bottom:70px}.call:nth-of-type(7){right:260px;bottom:70px}.behavior{display:grid;grid-template-columns:1.05fr .95fr;gap:34px;height:100%;padding:30px}.map{position:relative;border:1px solid var(--l)}.shell{position:absolute;left:60px;right:60px;top:50px;bottom:50px;border:3px solid var(--l);border-radius:46px}.person{position:absolute;left:48%;top:50%;transform:translate(-50%,-50%);width:58px;height:112px;border-radius:30px;background:linear-gradient(#F2F4F7,#8D9299)}.track{position:absolute;border:3px dashed var(--b);border-radius:50%;opacity:.75}.patrol{left:100px;top:85px;width:580px;height:350px}.follow{left:300px;top:185px;width:175px;height:145px;border-color:var(--o)}.dot{position:absolute;width:38px;height:38px;border-radius:50%;background:var(--o);box-shadow:0 0 24px rgba(255,122,26,.65)}.d1{left:345px;top:205px}.d2{right:145px;top:130px}.d3{left:185px;bottom:110px}.blist{border-left:4px solid var(--o);background:rgba(5,11,20,.62);padding:28px}.blist h3{font-size:24px;margin:0 0 22px}.blist p{font-size:17px;line-height:1.7;color:var(--m)}.blist b{color:var(--o)}.dock{height:100%;position:relative}.bodyA,.bodyB,.ring{position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;text-align:center;font:800 18px Inter}.bodyA{left:90px;width:250px;height:210px;border:4px solid var(--w);border-radius:48px}.ring{left:50%;transform:translate(-50%,-50%);width:150px;height:150px;border:4px solid var(--o);border-radius:50%;box-shadow:0 0 38px rgba(255,122,26,.3)}.bodyB{right:80px;width:330px;height:170px;border:4px solid var(--o);border-radius:40px}.dockline{position:absolute;left:350px;right:430px;top:50%;height:3px;background:linear-gradient(90deg,var(--l),var(--o))}.layers{display:grid;gap:14px;height:100%;padding:20px}.layer{border-left:4px solid var(--b);background:rgba(5,11,20,.62);padding:18px 26px;display:grid;grid-template-columns:300px 1fr;align-items:center}.layer b{font:900 28px Inter}.layer span{font-size:18px;color:var(--m)}.layer.social{border-left-color:var(--o);background:rgba(255,122,26,.10)}.feas{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;padding:48px}.feas .card{min-height:450px}.icon{width:62px;height:62px;border:2px solid var(--o);display:flex;align-items:center;justify-content:center;color:var(--o);font:900 26px Inter;margin-bottom:26px}.timeline{height:100%;position:relative}.line{position:absolute;left:100px;right:100px;top:280px;height:4px;background:linear-gradient(90deg,var(--o),var(--b))}.step{position:absolute;top:190px;width:330px;text-align:center}.step.s1{left:40px}.step.s2{left:50%;transform:translateX(-50%)}.step.s3{right:40px}.step b{width:78px;height:78px;border:3px solid var(--o);background:#07111F;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font:900 24px Inter;color:var(--o)}.step h3{font-size:24px;margin:0 0 10px}.step p{font-size:16px;line-height:1.5;color:var(--m)}#hint{position:fixed;right:18px;top:14px;z-index:20;color:#647086;font:12px Inter,Arial}@media print{html,body{overflow:visible;background:white}#deck{position:static;transform:none!important;width:1920px;height:auto}.slide{display:block!important;position:relative;page-break-after:always;break-after:page}#hint{display:none}@page{size:1920px 1080px;margin:0}}</style></head><body><div id="hint">← / → 翻页 · F 全屏 · 点击左右区域翻页</div><div id="deck"></div><script>const D=[['01 · SCENE JUDGEMENT','长期驻留任务中，舱内是人机关系形成的主场景','舱外任务低频、高风险、强功能；舱内工作与生活是高频、连续、长期共处场景。',['高频共处｜舱内工作、生活、休息交织','连续互动｜机器人持续进入人的工作空间','关系形成｜信任、舒适度与陪伴感在高频接触中建立'],'舱内是关系形成场，舱外是能力扩展场。','来源：NASA Astrobee 官方页面；作者设计推导。','hero'],['02 · EXISTING BASIS','舱内悬浮机器人不是空想，而是已有航天技术路径','Astrobee、CIMON、Int-Ball2 已证明舱内自由飞行机器人可承担拍摄、巡视、任务辅助和交互功能。',['NASA Astrobee｜模块化科研、例行辅助、舱内监测','DLR / ESA CIMON｜语音交互、任务辅助、陪伴探索','JAXA Int-Ball2｜拍照、录像、远程辅助'],'现有系统偏任务辅助，本研究进一步转向空间关系与长期陪伴。','来源：NASA Astrobee；DLR CIMON；JAXA Int-Ball2。','cases'],['03 · RESEARCH GAP','现有舱内机器人仍偏工具化，缺少“关系形成”设计','设计问题应从“机器人能完成什么任务”，扩展到“机器人如何以合适的空间行为与人共处”。',[],'不是再做一个会飞的摄像头，而是设计一个能维持合适社会距离的交互智能体。','来源：Chen 等关于社会临场感与人机信任的研究；作者设计推导。','compare'],['04 · ONE MIND, MULTIPLE BODIES','One Mind, Multiple Bodies：一脑多体模块化智能体系统','分体式方案的价值不在机械变形，而在同一智能体身份跨场景延续。',['Memory','Voice','Task Understanding','Spatial Strategy'],'同一身份，不同身体；同一关系，不同任务。','来源：月面服务机器人研究；作者系统命题。','core'],['05 · DESIGN SHOWCASE I','舱内主模块：低侵入、高在场的悬浮式交互智能体','舱内机器人不应强拟人化，也不应只是摄像头；它应以低侵入形态进入工作与生活空间。',['圆润防撞外壳','抽象表情屏','环形状态灯带','多向感知阵列','微姿态表达','标准化对接接口'],'它的目标不是“像人”，而是被感知为稳定、可靠、不过度打扰的在场对象。','来源：DLR CIMON 项目介绍；IBM 对 CIMON 的介绍；作者产品设计。','product'],['06 · DESIGN SHOWCASE II','空间行为不是移动路径，而是关系表达方式','核心创新不是“会飞”，而是通过距离、位置、朝向、靠近速度和停留时机调节人机关系。',['跟随型｜侧后方可见距离，协作但不打扰','待命型｜远距离悬停或回停靠点','主动接近型｜缓慢靠近 + 预提示','巡视型｜自主巡航记录异常','陪伴型｜保持视野边缘存在'],'机器人通过什么时候靠近、靠近到哪里、如何退开，塑造安全感与被支持感。','来源：Mumm & Mutlu；Kim & Mutlu；作者行为策略设计。','behavior'],['07 · DESIGN SHOWCASE III','从舱内陪伴到舱外作业：同一智能体的身体扩展','舱外身体不是另一个机器人，而是舱内智能体在高风险任务中的执行身体。',[],'航天员面对的仍是同一个智能体，只是从舱内陪伴形态切换为舱外作业形态。','来源：月面服务机器人研究；舱外机器人环境适应性研究；作者分体对接设计。','dock'],['08 · AI COMPANION LAYER','从硬件设备到具身化陪伴智能体','它不是遥控飞行器，而是具有感知、记忆、任务理解、表达和空间行为决策能力的具身化 AI 智能体。',['Expression｜语音、灯语、表情屏、姿态转向','Social Presence｜交互人格、信息披露、在场感','Spatial Behavior｜跟随、待命、靠近、巡视、陪伴','Cognition｜任务理解、历史记忆、异常判断','Perception｜位置、语音、动作、环境状态'],'不直接宣称“读懂情绪”，而是强调基于交互情境的支持性判断。','来源：Chen 等关于社会临场感的中介作用；HRI 情绪综述；作者系统层级设计。','layers'],['09 · FEASIBILITY','设计可行性：已有基础、边界清晰、可被验证','中期阶段不需要证明机器人已经能上天，而要证明设计对象、系统逻辑、场景边界和验证路径成立。',['Technology Feasibility｜已有舱内自由飞行机器人基础','Design Feasibility｜舱内交互聚焦，舱外能力扩展','Research Feasibility｜视频原型、问卷与专家评价可实施'],'本阶段验证系统逻辑与交互可行性，不验证航天工程级性能。','来源：NASA Astrobee；月面服务机器人研究；作者可行性边界。','feas'],['10 · NEXT STEP','后续工作：设计深化、行为原型与用户验证','接下来不要继续无限扩展形态，而要把“舱内悬浮体—舱外作业体—空间行为策略”变成可验证研究。',['设计深化｜外观、状态灯、感知阵列、对接接口','行为原型｜五类空间行为视频与任务脚本','验证研究｜安全感、信任、社会临场感、心理距离'],'从造型方案走向可验证的人机关系设计。','来源：HRI 情绪综述；机器人触碰前提示研究；作者后续计划。','timeline']];function V(k,a){if(k==='hero')return `<div class="hero"><div class="hero-img"><div class="hero-label">空间站舱内 / 航天员操作设备场景</div><div class="hero-key">Cabin = Long-term Interaction Field</div></div><div class="logic">${a.map((x,i)=>`<div class="logic-item"><b>0${i+1}</b><div><h3>${x.split('｜')[0]}</h3><p>${x.split('｜')[1]}</p></div></div>`).join('')}</div></div>`;if(k==='cases')return `<div class="cards">${a.map((x,i)=>`<div class="card"><div class="shape"><div class="${['cube','ball','mini'][i]}"></div></div><h3>${x.split('｜')[0]}</h3><p>${x.split('｜')[1]}</p></div>`).join('')}</div>`;if(k==='compare')return `<div class="compare"><div class="box tool"><h3>Tool Robot</h3><ul><li>拍摄</li><li>巡检</li><li>信息查询</li><li>远程观察</li><li>技术验证</li></ul></div><div class="mid">长期驻留任务驱动<i></i>角色转变</div><div class="box agent"><h3>Companion Agent</h3><ul><li>空间距离调节</li><li>状态感知</li><li>关系连续</li><li>社会临场感</li><li>情感支持</li></ul></div></div>`;if(k==='core')return `<div class="core"><div class="coreline"></div><div class="node top">Cabin Floating Body</div><div class="coreball">Cognitive<br>Interaction Core</div><div class="node bottom">Lunar Working Body</div><div class="tags">${a.map(x=>`<span>${x}</span>`).join('')}</div></div>`;if(k==='product')return `<div class="product"><div class="bot"></div>${a.map(x=>`<div class="call">${x}</div>`).join('')}</div>`;if(k==='behavior')return `<div class="behavior"><div class="map"><div class="shell"></div><div class="person"></div><div class="track patrol"></div><div class="track follow"></div><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div><div class="blist"><h3>五类空间行为策略</h3>${a.map(x=>`<p><b>${x.split('｜')[0]}：</b>${x.split('｜')[1]}</p>`).join('')}</div></div>`;if(k==='dock')return `<div class="dock"><div class="bodyA">Cabin Floating Body</div><div class="dockline"></div><div class="ring">Dock</div><div class="bodyB">Lunar Working Body</div></div>`;if(k==='layers')return `<div class="layers">${a.map((x,i)=>`<div class="layer ${i===1?'social':''}"><b>${x.split('｜')[0]}</b><span>${x.split('｜')[1]}</span></div>`).join('')}</div>`;if(k==='feas')return `<div class="feas">${a.map(x=>`<div class="card"><div class="icon">${x[0]}</div><h3>${x.split('｜')[0]}</h3><p>${x.split('｜')[1]}</p></div>`).join('')}</div>`;return `<div class="timeline"><div class="line"></div>${a.map((x,i)=>`<div class="step s${i+1}"><b>0${i+1}</b><h3>${x.split('｜')[0]}</h3><p>${x.split('｜')[1]}</p></div>`).join('')}</div>`}const deck=document.getElementById('deck');D.forEach((x,i)=>{const q=document.createElement('section');q.className='slide'+(i===0?' active':'');q.innerHTML=`<div class="content"><div class="k">${x[0]}</div><h1 class="t">${x[1]}</h1><p class="s">${x[2]}</p><div class="stage">${V(x[6],x[3])}</div><div class="c">${x[4]}</div></div><div class="footer"><div>${x[5]}</div><div class="page">${String(i+1).padStart(2,'0')} / 10</div></div>`;deck.appendChild(q)});const S=[...document.querySelectorAll('.slide')];let I=0;function Z(){let k=Math.min(innerWidth/1920,innerHeight/1080);deck.style.transform=`translate(-50%,-50%) scale(${k})`}function G(n){I=Math.max(0,Math.min(S.length-1,n));S.forEach((x,j)=>x.classList.toggle('active',I===j))}onresize=Z;Z();onkeydown=e=>{if(e.key==='ArrowRight'||e.key===' ')G(I+1);if(e.key==='ArrowLeft')G(I-1);if(e.key.toLowerCase()==='f')document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()};onclick=e=>e.clientX>innerWidth/2?G(I+1):G(I-1)</script></body></html>
