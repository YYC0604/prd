<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>交大野协｜顺朝五台小主人抽签</title>
<style>
:root{--bg:#11100c;--gold:#e7d2a2;--gold2:#fff0c8;--line:rgba(231,210,162,.22);--card:rgba(34,27,18,.82)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#090807;color:var(--gold);font-family:"Songti SC","STSong","Noto Serif SC",serif}body{background:radial-gradient(circle at 50% 9%,rgba(190,142,77,.22),transparent 34%),radial-gradient(circle at 22% 30%,rgba(231,210,162,.08) 0 2px,transparent 3px),radial-gradient(circle at 86% 42%,rgba(231,210,162,.1) 0 2px,transparent 3px),linear-gradient(180deg,#15130e,#080807)}.page{width:min(430px,100%);min-height:100svh;margin:auto;padding:calc(env(safe-area-inset-top) + 28px) 22px 28px;display:flex;flex-direction:column;align-items:center}.top{width:100%;display:flex;justify-content:space-between;align-items:center}.badge,.more{border:1px solid var(--line);background:rgba(255,255,255,.03);color:rgba(231,210,162,.72);font-family:system-ui,-apple-system,"PingFang SC",sans-serif}.badge{border-radius:99px;padding:8px 13px;font-size:13px;letter-spacing:.12em}.more{width:40px;height:40px;border-radius:50%;font-size:20px}h1{margin:42px 0 4px;text-align:center;font-size:22px;line-height:1.5;letter-spacing:.24em;color:var(--gold2);font-weight:600;text-shadow:0 0 28px rgba(231,210,162,.28)}.sub{text-align:center;color:rgba(231,210,162,.58);font:13px/1.9 system-ui,-apple-system,"PingFang SC",sans-serif;letter-spacing:.1em}.stage{width:100%;height:390px;position:relative;display:flex;align-items:flex-end;justify-content:center;perspective:1000px}.halo{position:absolute;bottom:72px;width:310px;height:310px;border-radius:50%;background:radial-gradient(circle,rgba(231,210,162,.17),rgba(231,210,162,.04) 45%,transparent 70%);filter:blur(8px)}.stars i{position:absolute;width:4px;height:4px;border-radius:50%;background:#d7bd78;opacity:.55;box-shadow:0 0 12px #d7bd78;animation:tw 2.7s infinite}.stars i:nth-child(1){left:54px;top:60px}.stars i:nth-child(2){right:55px;top:126px;animation-delay:.5s}.stars i:nth-child(3){left:80px;bottom:160px;animation-delay:1s}.stars i:nth-child(4){right:90px;bottom:210px;animation-delay:1.5s}@keyframes tw{50%{opacity:.15;transform:scale(.6)}}.tube-wrap{width:260px;height:320px;position:relative;display:flex;align-items:flex-end;justify-content:center;filter:drop-shadow(0 28px 36px rgba(0,0,0,.55))}.tube-wrap.shake{animation:shake .75s ease}@keyframes shake{20%{transform:rotate(-5deg)}40%{transform:rotate(4deg)}60%{transform:rotate(-3deg)}80%{transform:rotate(2deg)}}.sticks{position:absolute;bottom:142px;width:228px;height:190px;display:flex;align-items:flex-end;justify-content:center;gap:8px;z-index:1}.stick{width:15px;border-radius:2px;background:linear-gradient(90deg,#d5b778,#fff0c4,#c59755);box-shadow:0 10px 18px rgba(0,0,0,.28),inset -1px 0 rgba(70,43,18,.25)}.stick:nth-child(1){height:86px}.stick:nth-child(2){height:118px}.stick:nth-child(3){height:152px}.stick:nth-child(4){height:100px}.stick:nth-child(5){height:180px}.stick:nth-child(6){height:220px}.stick:nth-child(7){height:168px}.stick:nth-child(8){height:136px}.stick:nth-child(9){height:154px}.stick:nth-child(10){height:116px}.stick:nth-child(11){height:86px}.draw-stick{position:absolute;left:50%;bottom:152px;margin-left:-17px;width:34px;height:230px;border-radius:3px;background:linear-gradient(90deg,#c29452,#fff1c8,#b27d42);opacity:0;transform:translateY(55px);transition:.72s cubic-bezier(.2,.75,.1,1);z-index:2}.draw-stick.show{opacity:1;transform:translateY(-122px) rotate(-2deg)}.mouth{position:absolute;bottom:126px;width:252px;height:32px;border-radius:5px;background:linear-gradient(#b78a4d,#815528);z-index:4}.tube{position:absolute;bottom:0;width:220px;height:154px;border-radius:3px 3px 18px 18px;background:linear-gradient(#9b7240,#65401d);z-index:3}.tube:before{content:"";position:absolute;inset:30px 22px 14px;border:1px solid rgba(255,230,180,.16);border-radius:7px}.tube-title{position:absolute;left:0;right:0;top:42px;text-align:center;color:#f3dfb8;font-size:30px;line-height:1.45;letter-spacing:.18em}.slip{position:absolute;left:50%;bottom:112px;margin-left:-62px;width:124px;height:255px;z-index:6;transform-style:preserve-3d;opacity:0;transform:translateY(70px) scale(.85);transition:.75s cubic-bezier(.2,.75,.1,1)}.slip.reveal{opacity:1;transform:translateY(-114px) rotateX(180deg) scale(1)}.face{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;text-orientation:upright;text-align:center;letter-spacing:.12em;box-shadow:0 18px 38px rgba(0,0,0,.48),inset 0 0 0 1px rgba(255,255,255,.16)}.front{background:linear-gradient(#9d7140,#6b451f);color:#f5dfb6;font-size:24px}.back{background:linear-gradient(#eed9ab,#b98f57);color:#422a13;transform:rotateX(180deg);font-size:24px;font-weight:800}.back small{font:700 11px/1.35 system-ui,-apple-system,"PingFang SC",sans-serif;color:rgba(66,42,19,.72)}.panel,.admin{width:100%;margin-top:6px;padding:18px 16px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(42,34,24,.84),rgba(17,14,10,.8));box-shadow:0 24px 80px rgba(0,0,0,.45);font-family:system-ui,-apple-system,"PingFang SC",sans-serif}.admin{display:none;margin-top:16px}label{display:block;margin-bottom:9px;color:rgba(241,220,178,.76);font-size:14px;font-weight:700;letter-spacing:.08em}input{width:100%;height:50px;border-radius:15px;border:1px solid var(--line);background:rgba(0,0,0,.24);color:#fff0c8;outline:none;padding:0 15px;font-size:16px}input::placeholder{color:rgba(231,210,162,.36)}button{width:100%;height:52px;margin-top:14px;border:0;border-radius:16px;background:linear-gradient(#ecd49d,#a67b43);color:#25180b;font-size:16px;font-weight:900;letter-spacing:.14em;cursor:pointer}button:disabled{opacity:.45}.note,.msg{font-size:12px;line-height:1.8;color:rgba(231,210,162,.55);text-align:center}.msg{min-height:20px;color:#efd6a2}.result{display:none;margin-top:12px;border:1px solid var(--line);border-radius:18px;background:rgba(0,0,0,.24);padding:16px;text-align:center;color:#ead5a9;line-height:1.85}.result strong{display:block;font-family:"Songti SC","STSong",serif;font-size:30px;color:#fff0c8;letter-spacing:.18em}.wish{display:block;color:#0a84ff;font-weight:800;font-size:15px}.hide{display:none}.table{overflow:auto;margin-top:12px;max-height:280px;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}th,td{padding:9px;border-bottom:1px solid rgba(231,210,162,.1);text-align:left}th{color:#fff0c8}.ghost{height:42px;background:rgba(255,255,255,.04);color:#efd6a2;border:1px solid var(--line);font-size:13px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(18px);opacity:0;background:rgba(0,0,0,.78);color:#fff0c8;padding:10px 14px;border-radius:99px;font:13px system-ui;transition:.25s}.toast.show{opacity:1;transform:translateX(-50%)}
</style>
</head>
<body>
<main class="page">
  <div class="top"><div class="badge">交大野协</div><button class="more" id="adminEntry">…</button></div>
  <h1>诚心所求，签自有灵…</h1><div class="sub">0710-0712 顺朝五台<br>小天使和小主人抽签</div>
  <section class="stage"><div class="halo"></div><div class="stars"><i></i><i></i><i></i><i></i></div><div class="tube-wrap" id="tubeWrap"><div class="sticks"><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span><span class="stick"></span></div><div class="draw-stick" id="drawStick"></div><div class="mouth"></div><div class="tube"><div class="tube-title">今日<br>一签</div></div><div class="slip" id="slip"><div class="face front">请签</div><div class="face back"><span id="slipName">小主人</span><small id="slipWish">喜至福来 长乐永康</small></div></div></div></section>
  <section class="panel"><label for="ownerName">姓名 / 花名</label><input id="ownerName" placeholder="请输入你的姓名/花名" autocomplete="name"><button id="drawBtn">点击抽签</button><p class="note">每一个人只能抽取一次；抽签结果不会公开给大家。</p><div class="msg" id="message"></div><div class="result" id="resultCard">你抽中的小主人是<strong id="resultName">—</strong>请截图保存，不要外传噢。<span class="wish">请努力完成TA的愿望吧。</span></div></section>
  <section class="admin" id="adminPanel"><h2>管理员结果表</h2><label for="adminPass">管理员密码</label><input id="adminPass" type="password" placeholder="输入密码后查看全部结果"><button id="unlockBtn">查看结果</button><div class="msg" id="adminMsg"></div><div class="table hide" id="tableWrap"><table id="resultTable"></table></div><div id="adminActions" class="hide"><button class="ghost" id="copyBtn">复制表格</button><button class="ghost" id="exportBtn">导出 CSV</button><button class="ghost" id="refreshBtn">刷新</button></div></section>
</main><div class="toast" id="toast"></div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbwdcwLtg-EjZPl4WvN7o8sjoRln4k1TfUX1WwDOEalr_iX9Ny87t5om1awOIaYDScodPg/exec";
const BLESSINGS=["喜至福来 长乐永康","福气满满 万事顺意","年年无碍 岁岁无忧","福气东来 鸿运通天","事事回甘 平安喜乐","学业日进 喜事连连","时和年丰 顺心如意","顺遂无虞 笑口常开","福气长临 沐光而行","顺风顺水 丰财聚宝","岁岁欢愉 随缘随心"];
const $=s=>document.querySelector(s);let adminRows=[];
function bless(seed){let h=0;seed=String(seed||"");for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))>>>0;return BLESSINGS[h%BLESSINGS.length]}
function toast(t){let e=$("#toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2200)}
function esc(s){return String(s??"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}
function api(action,params={}){return new Promise((ok,bad)=>{let cb="yexie_cb_"+Date.now()+"_"+Math.random().toString(36).slice(2);let u=new URL(API_URL);u.searchParams.set("action",action);u.searchParams.set("callback",cb);Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v??"")));let s=document.createElement("script");let timer=setTimeout(()=>{clean();bad(new Error("请求超时：请检查 Apps Script 是否部署为 /exec，访问权限是否为任何人"))},30000);function clean(){clearTimeout(timer);delete window[cb];s.remove()}window[cb]=d=>{clean();ok(d)};s.onerror=()=>{clean();bad(new Error("网络异常，请重试"))};s.src=u.toString();document.body.appendChild(s)})}
function showResult(name){let w=bless(name+$("#ownerName").value.trim());$("#slipName").textContent=name;$("#slipWish").textContent=w;$("#resultName").textContent=name;$("#drawStick").classList.add("show");setTimeout(()=>$("#slip").classList.add("reveal"),420);$("#resultCard").style.display="block"}
function loading(x){$("#drawBtn").disabled=x;$("#drawBtn").textContent=x?"抽签中…":"点击抽签"}
function draw(){let name=$("#ownerName").value.trim();if(!name){toast("请输入你的姓名/花名");return}loading(true);$("#message").textContent="签筒已动，灵签将出…";$("#tubeWrap").classList.add("shake");api("draw",{name,userAgent:navigator.userAgent}).then(r=>{setTimeout(()=>{$("#tubeWrap").classList.remove("shake");if(!r||!r.ok){loading(false);$("#message").textContent=r?.message||"抽签失败，请稍后再试";return}$("#ownerName").disabled=true;showResult(r.angel);$("#message").textContent=r.already?"你已经抽过签啦。":"签已落定。"},760)}).catch(e=>{loading(false);$("#tubeWrap").classList.remove("shake");$("#message").textContent=e.message})}
function checkMine(){let name=$("#ownerName").value.trim();if(!name)return;api("mine",{name}).then(r=>{if(r&&r.ok&&r.found){$("#ownerName").disabled=true;$("#drawBtn").disabled=true;$("#message").textContent="你已经抽过签啦。";showResult(r.angel)}}).catch(()=>{})}
function unlock(){let key=$("#adminPass").value;$("#adminMsg").textContent="读取中…";api("admin",{key}).then(r=>{if(!r||!r.ok){$("#adminMsg").textContent=r?.message||"无法读取";return}adminRows=r.rows||[];$("#resultTable").innerHTML="<thead><tr><th>#</th><th>抽签人/小天使</th><th>抽中的小主人</th><th>时间</th></tr></thead><tbody>"+adminRows.map((x,i)=>`<tr><td>${i+1}</td><td>${esc(x.owner)}</td><td>${esc(x.angel)}</td><td>${esc(x.time)}</td></tr>`).join("")+"</tbody>";$("#adminMsg").textContent=`已抽 ${r.drawn} / ${r.total} 人，剩余 ${r.remaining} 支签`;$("#tableWrap").classList.remove("hide");$("#adminActions").classList.remove("hide")}).catch(e=>$("#adminMsg").textContent=e.message)}
function csv(){return ["序号,抽签人/小天使,抽中的小主人,时间",...adminRows.map((r,i)=>[i+1,r.owner,r.angel,r.time].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","))].join("\n")}
$("#drawBtn").onclick=draw;$("#ownerName").onchange=checkMine;$("#adminEntry").onclick=()=>{$("#adminPanel").style.display=$("#adminPanel").style.display==="block"?"none":"block"};$("#unlockBtn").onclick=unlock;$("#refreshBtn").onclick=unlock;$("#copyBtn").onclick=async()=>{await navigator.clipboard.writeText(csv());toast("已复制")};$("#exportBtn").onclick=()=>{let a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\ufeff"+csv()],{type:"text/csv"}));a.download="交大野协顺朝五台抽签结果.csv";a.click();URL.revokeObjectURL(a.href)};if(location.search.includes("admin=1"))$("#adminPanel").style.display="block";
</script>
</body>
</html>
